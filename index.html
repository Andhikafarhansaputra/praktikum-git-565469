<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BloomFlower - Toko Bunga Online</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #f3f0fa;
            color: #333;
        }

        header {
            position: sticky;
            top: 0;
            background: #7e57c2;
            color: white;
            padding: 15px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
        }

        nav ul {
            display: flex;
            list-style: none;
            gap: 20px;
        }

        nav a {
            color: white;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
        }

        nav a:hover,
        nav a.active {
            color: #a5d6a7;
        }

        /* HAMBURGER */
        .menu-toggle {
            display: none;
            font-size: 25px;
            cursor: pointer;
        }

        #hero {
            text-align: center;
            padding: 80px 20px;
            background: linear-gradient(rgba(126,87,194,0.7), rgba(102,187,106,0.7)),
                        url('https://source.unsplash.com/1600x600/?flowers');
            background-size: cover;
            color: white;
        }

        #produk {
            padding: 50px;
            text-align: center;
        }

        .produk-container {
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
        }

        .produk-item {
            background: white;
            padding: 20px;
            width: 250px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .produk-item img {
            width: 100%;
            border-radius: 10px;
        }

        .produk-item button {
            background: #66bb6a;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 20px;
            cursor: pointer;
        }

        /* SECTION */
        section {
            scroll-margin-top: 80px;
        }

        #testimoni {
            background: #e8f5e9;
            padding: 50px;
            text-align: center;
        }

        blockquote {
            margin: 15px auto;
            max-width: 500px;
            font-style: italic;
        }

        /* CTA */
        #cta {
            text-align: center;
            padding: 50px;
        }

        #cta button {
            background: #7e57c2;
            color: white;
            padding: 12px 30px;
            border-radius: 25px;
            border: none;
        }

        footer {
            background: #2c2c2c;
            color: #fff;
            padding: 40px 50px 20px;
        }

        .footer-container {
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 30px;
        }

        .footer-section {
            max-width: 250px;
        }

        .footer-section h3 {
            margin-bottom: 15px;
            color: #a5d6a7;
        }

        /* FOOTER */
        footer {
            background: #333;
            color: white;
            text-align: center;
            margin-top: 20px;
            border-top: 1px solid #555;
            padding-top: 10px;
            font-size: 13px;
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            nav ul {
                position: absolute;
                top: 70px;
                right: 0;
                background: #7e57c2;
                flex-direction: column;
                width: 200px;
                display: none;
                padding: 20px;
            }

            nav ul.show {
                display: flex;
            }

            .menu-toggle {
                display: block;
            }
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            nav ul {
                position: absolute;
                top: 70px;
                right: 0;
                background: #7e57c2;
                flex-direction: column;
                width: 200px;
                display: none;
                padding: 20px;
            }

            nav ul.show {
                display: flex;
            }

            .menu-toggle {
                display: block;
            }
        }
    </style>
</head>

<body>

<header>
    <h1>BloomFlower</h1>

    <div class="menu-toggle" onclick="toggleMenu()">☰</div>

    <nav>
        <ul id="menu">
            <li><a href="#hero" class="nav-link active">Home</a></li>
            <li><a href="#produk" class="nav-link">Produk</a></li>
            <li><a href="#testimoni" class="nav-link">Testimoni</a></li>
            <li><a href="#cta" class="nav-link">Kontak</a></li>
        </ul>
    </nav>
</header>

<section id="hero">
    <h2>Bunga Segar untuk Setiap Momen</h2>
    <p>Kirim kebahagiaan dengan bunga terbaik</p>
</section>

<section id="produk">
    <h2>Produk Unggulan</h2>
    <div class="produk-container">
        <div class="produk-item">
            <img src="https://source.unsplash.com/300x200/?rose">
            <h3>Buket Mawar</h3>
            <p>Rp150.000</p>
            <button>Beli</button>
        </div>
        <div class="produk-item">
            <img src="https://source.unsplash.com/300x200/?tulip">
            <h3>Buket Tulip</h3>
            <p>Rp200.000</p>
            <button>Beli</button>
        </div>
    </div>
</section>

<section id="testimoni">
    <h2>Testimoni</h2>
    <p>"Bunganya segar dan cantik!"</p>
</section>

<section id="cta">
    <h2>Pesan Sekarang</h2>
    <button>Pesan</button>
</section>

<footer>
    <p>&copy; 2026 BloomFlower</p>
</footer>

<script>
    function toggleMenu() {
        document.getElementById("menu").classList.toggle("show");
    }

    // Active menu saat scroll
    const sections = document.querySelectorAll("section");
    const navLinks = document.querySelectorAll(".nav-link");

    window.addEventListener("scroll", () => {
        let current = "";

        sections.forEach(section => {
            const sectionTop = section.offsetTop - 100;
            if (pageYOffset >= sectionTop) {
                current = section.getAttribute("id");
            }
        });

        navLinks.forEach(link => {
            link.classList.remove("active");
            if (link.getAttribute("href") === "#" + current) {
                link.classList.add("active");
            }
        });
    });
</script>

</body>
</html>
